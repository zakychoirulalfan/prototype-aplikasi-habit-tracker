<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: {
                            500: '#10B981',
                        },
                        blue: {
                            500: '#5BA4C9',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 flex justify-between items-center animate-slide-up">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-gray-100 shadow-sm relative group">
                <img src="https://i.pravatar.cc/150?img=11" alt="Profile" class="w-full h-full object-cover">
            </div>
            <div>
                <p class="text-[10px] font-medium text-gray-500 uppercase tracking-wide">WELCOMEBACK</p>
                <div class="flex items-center gap-1">
                    <h1 class="text-xl font-bold text-gray-900 leading-none">Username</h1>
                    <div class="text-blue-500 text-sm">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                </div>
            </div>
        </div>
        <button class="w-10 h-10 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center hover:bg-gray-200 transition">
            <i class="fa-regular fa-bell"></i>
        </button>
    </header>

    <!-- Hero Image Slider -->
    <section class="px-6 py-2 animate-slide-up delay-100 relative group" id="hero-slider-section">
        <div class="overflow-hidden rounded-3xl relative h-48 w-full shadow-[0_10px_25px_-5px_rgba(0,0,0,0.1)]">
            <!-- Sliding Container -->
            <div class="flex h-full transition-transform duration-500 ease-in-out w-[300%]" id="hero-slider-track">
                
                <!-- Slide 1 -->
                <div class="w-1/3 h-full shrink-0 relative">
                    <img src="assets/green card1.jpeg" class="w-full h-full object-cover" alt="Growth and Consistent">
                </div>
                
                <!-- Slide 2 -->
                <div class="w-1/3 h-full shrink-0 relative">
                    <img src="assets/motivation_card.png" class="w-full h-full object-cover" alt="Elevate Your Mind">
                </div>
                
                <!-- Slide 3 -->
                <div class="w-1/3 h-full shrink-0 relative">
                    <img src="assets/promotion_card.png" class="w-full h-full object-cover" alt="Unlock Premium">
                </div>
                
            </div>
            
            <!-- Indicators -->
            <div class="absolute bottom-3 left-0 right-0 flex justify-center gap-2 z-20" id="hero-indicators">
                <button class="w-2.5 h-2.5 rounded-full bg-white opacity-100 shadow-sm transition-all" onclick="goToSlide(0)"></button>
                <button class="w-1.5 h-1.5 rounded-full bg-white opacity-50 transition-all hover:opacity-100" onclick="goToSlide(1)"></button>
                <button class="w-1.5 h-1.5 rounded-full bg-white opacity-50 transition-all hover:opacity-100" onclick="goToSlide(2)"></button>
            </div>
        </div>
    </section>

    <!-- Date & Time Section -->
    <section class="mt-8 animate-slide-up delay-200 w-full overflow-hidden">
        <div class="px-6 flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-gray-900">Date & Time</h2>
        </div>

        <!-- Month Selector -->
        <div class="flex w-full overflow-x-auto no-scrollbar px-6 gap-6 mb-4 pb-1" id="mobile-month-selector">
            <!-- Dynamically populated -->
        </div>

        <!-- Date Selector -->
        <div class="flex w-full overflow-x-auto no-scrollbar px-6 gap-3 pb-4" id="mobile-date-selector">
            <!-- Dynamically populated -->
        </div>
    </section>

    <!-- Habits List -->
    <section class="mt-4 px-6 animate-slide-up delay-300">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Your Habits</h2>
        
        <div class="flex flex-col gap-4 mb-8" id="habit-list">
            <!-- Habit Item 1 -->
            <div class="habit-card rounded-2xl p-4 flex items-center justify-between text-white shadow-[0_4px_14px_0_rgba(16,185,129,0.39)]">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 border-2 border-white/80 rounded-full flex items-center justify-center text-xl shrink-0">
                        <i class="fa-solid fa-book-open"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-base w-32 truncate">Reading Book</h3>
                        <p class="text-xs font-medium text-white/90">0/20 Minute</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button class="check-btn w-9 h-9 rounded-full border-2 border-white flex items-center justify-center hover:bg-white hover:text-[var(--primary)] transition-colors">
                        <i class="fa-solid fa-check"></i>
                    </button>
                    <button class="text-white opacity-80 h-10 px-2 flex flex-col justify-center gap-1">
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                    </button>
                </div>
            </div>

            <!-- Habit Item 2 -->
            <div class="habit-card rounded-2xl p-4 flex items-center justify-between text-white shadow-[0_4px_14px_0_rgba(16,185,129,0.39)]" style="animation-delay: 0.35s">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 border-2 border-white/80 rounded-full flex items-center justify-center text-xl shrink-0">
                        <i class="fa-solid fa-dumbbell"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-base w-32 truncate">Workout Push day</h3>
                        <p class="text-xs font-medium text-white/90">0/20 Minute</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button class="check-btn w-9 h-9 rounded-full border-2 border-white flex items-center justify-center hover:bg-white hover:text-[var(--primary)] transition-colors">
                        <i class="fa-solid fa-check"></i>
                    </button>
                    <button class="text-white opacity-80 h-10 px-2 flex flex-col justify-center gap-1">
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                    </button>
                </div>
            </div>

            <!-- Habit Item 3 -->
            <div class="habit-card rounded-2xl p-4 flex items-center justify-between text-white shadow-[0_4px_14px_0_rgba(16,185,129,0.39)]" style="animation-delay: 0.4s">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 border-2 border-white/80 rounded-full flex items-center justify-center text-xl shrink-0">
                        <i class="fa-solid fa-person-running"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-base w-32 truncate">Jogging</h3>
                        <p class="text-xs font-medium text-white/90">0/20 Minute</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button class="check-btn w-9 h-9 rounded-full border-2 border-white flex items-center justify-center hover:bg-white hover:text-[var(--primary)] transition-colors opacity-50 relative overflow-hidden">
                        <i class="fa-solid fa-check invisible"></i>
                    </button>
                    <button class="text-white opacity-80 h-10 px-2 flex flex-col justify-center gap-1">
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                        <span class="w-1 h-1 bg-white rounded-full"></span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center px-2 z-50 animate-slide-up delay-400">
        <a href="index.html" class="nav-item active flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="calendar.html" class="nav-item flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-calendar-days text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Calendar</span>
        </a>
        
        <!-- FAB Add Button -->
        <div class="fab-container w-16 flex justify-center">
            <button class="fab w-14 h-14 rounded-full text-white flex items-center justify-center text-2xl absolute border-[6px] border-white focus:outline-none" onclick="openAddModal()">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        
        <a href="statistics.html" class="nav-item flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-chart-simple text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Statistics</span>
        </a>
        <a href="profile.html" class="nav-item flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>

    <!-- Floating action removed, moved to profile.html -->

    <script src="js/app.js"></script>
    <script>
        // Update box shadow based on theme
        function updateShadows(theme) {
            const cards = document.querySelectorAll('.habit-card');
            cards.forEach(card => {
                if (theme === 'blue') {
                    card.style.boxShadow = '0 4px 14px 0 rgba(91, 164, 201, 0.39)';
                } else {
                    card.style.boxShadow = '0 4px 14px 0 rgba(16, 185, 129, 0.39)';
                }
            });
        }
        
        // Listen to theme changes from app.js
        document.addEventListener('themeChanged', (e) => {
            updateShadows(e.detail.theme);
        });
        
        // Init shadows
        setTimeout(() => {
            updateShadows(document.documentElement.getAttribute('data-theme') || 'green');
        }, 100);
    </script>
</body>
</html>
