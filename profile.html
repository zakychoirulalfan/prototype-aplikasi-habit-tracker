<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981' },
                        blue: { 500: '#5BA4C9' }
                    }
                }
            }
        }
    </script>
</head>
<body class="pb-24 bg-gray-50">

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 flex justify-between items-center animate-slide-up">
        <h1 class="text-2xl font-bold text-gray-900">Profile</h1>
    </header>

    <!-- Profile Section -->
    <section class="px-6 mt-4 animate-slide-up delay-100">
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col items-center">
            
            <div class="relative mb-4 group transition-transform hover:scale-105 active:scale-95 cursor-pointer">
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-lg">
                    <img id="profile-img" src="https://i.pravatar.cc/150?img=11" alt="Profile Name" class="w-full h-full object-cover">
                </div>
                <div class="absolute bottom-0 right-0 bg-[var(--primary)] text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                    <i class="fa-solid fa-camera text-xs"></i>
                </div>
            </div>
            
            <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                <span id="display-username">Loading...</span>
                <i class="fa-solid fa-circle-check text-blue-500 text-sm"></i>
            </h2>
            <p class="text-sm text-gray-500 font-medium mt-1" id="display-email">loading...</p>
            
            <span class="mt-3 px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-semibold flex items-center gap-1">
                <i class="fa-brands fa-google text-sm mt-px"></i> Google Authenticated
            </span>
        </div>
    </section>

    <!-- Profile Updates List -->
    <section class="px-6 mt-6 animate-slide-up delay-200">
        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3 px-2">Account Options</h3>
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
            
            <!-- Edit Username -->
            <button onclick="editUsername()" class="w-full px-5 py-4 flex items-center justify-between border-b border-gray-100 hover:bg-gray-50 transition-colors text-left group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-regular fa-id-badge"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">Edit Username</h4>
                        <p class="text-xs font-medium text-gray-500">Change your display name</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>

            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors text-left group border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-palette"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">App Theme</h4>
                        <p class="text-xs font-medium text-gray-500">Switch color mode</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>
            
            <!-- Reset Password -->
            <button onclick="resetPassword()" class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors text-left group border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-envelope-open-text"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">Reset Password</h4>
                        <p class="text-xs font-medium text-gray-500">Send reset link to email</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>
            
            <!-- Log Out -->
            <button onclick="logout()" class="w-full px-5 py-4 flex items-center justify-between hover:bg-red-50 transition-colors text-left group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-red-600">Log Out</h4>
                        <p class="text-xs font-medium text-red-400">Securely sign out</p>
                    </div>
                </div>
            </button>

        </div>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center px-2 z-50">
        <a href="index.html" class="nav-item flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="calendar.html" class="nav-item flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-calendar-days text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Calendar</span>
        </a>
        
        <div class="fab-container w-16 flex justify-center">
            <button class="fab w-14 h-14 rounded-full text-white flex items-center justify-center text-2xl absolute border-[6px] border-white" onclick="openAddModal()">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        
        <a href="statistics.html" class="nav-item flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-chart-simple text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Statistics</span>
        </a>
        <a href="profile.html" class="nav-item active flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        // Mock profile actions
        function editUsername() {
            const currentName = document.getElementById('display-username').innerText;
            const newName = prompt("Enter your new username:", currentName);
            if(newName && newName.trim() !== "") {
                document.getElementById('display-username').innerText = newName.trim();
                alert(`Username updated to ${newName.trim()}!`);
            }
        }
        
        function resetPassword() {
            if(confirm("Send a password reset link to user@example.com?")) {
                alert("Reset link sent! Please check your email.");
            }
        }
        
        function logout() {
            handleSignOut();
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            // Fetch User Details to display
            if (supabase) {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    const name = user.user_metadata?.full_name || 'User';
                    const email = user.email;
                    document.getElementById('display-username').innerText = name;
                    document.getElementById('display-email').innerText = email;
                    document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${name}&background=random&color=fff`;
                }
            }
        });
    </script>
</body>
</html>
