<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981' },
                        blue: { 500: '#5BA4C9' }
                    }
                }
            }
        }
    </script>
</head>

<body class="pb-24 bg-gray-50 min-h-screen flex flex-col relative overflow-y-auto overflow-x-hidden">

    <!-- AUTHENTICATION GUARD LOADER -->
    <div id="auth-guard-loader" class="fixed inset-0 bg-white z-[99999] flex flex-col items-center justify-center transition-opacity duration-300">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-[var(--primary)] text-green-500 mb-4"></i>
        <p class="text-gray-500 font-medium tracking-wide">Verifying Session...</p>
    </div>

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 flex justify-between items-center animate-slide-up relative z-10">
        <h1 class="text-2xl font-bold text-white">Profile</h1>
    </header>

    <!-- Profile Section -->
    <section class="px-6 mt-4 animate-slide-up delay-100">
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col items-center justify-center space-y-2">

            <!-- Avatar Container -->
            <div class="relative group transition-transform hover:scale-105 active:scale-95 cursor-pointer"
                onclick="document.getElementById('avatar-input').click()">
                
                <!-- Skeleton Loader -->
                <div id="avatar-skeleton" class="w-24 h-24 rounded-full border-4 border-white shadow-lg bg-gray-200 animate-pulse absolute inset-0 z-10"></div>

                <!-- Actual Avatar -->
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-lg relative z-20 opacity-0 transition-opacity duration-300" id="avatar-wrapper">
                    <img id="profile-img" src="../assets/defaultphoto.png" alt="Profile"
                        class="w-full h-full object-cover">
                    <!-- Loading indicator saat upload -->
                    <div id="avatar-loading"
                        class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 transition-opacity duration-300 hidden">
                        <i class="fa-solid fa-spinner fa-spin text-white text-2xl"></i>
                    </div>
                </div>
                
                <div class="absolute bottom-0 right-0 z-30 bg-[var(--primary)] text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white shadow-sm hover:scale-110 transition-transform">
                    <i class="fa-solid fa-camera text-xs"></i>
                </div>
            </div>
            
            <input type="file" id="avatar-input" accept="image/*" class="hidden">

            <!-- Name and Email Skeletons -->
            <div id="text-skeleton" class="flex flex-col items-center space-y-2 w-full mt-2">
                <div class="h-6 w-32 bg-gray-200 rounded animate-pulse"></div>
                <div class="h-4 w-48 bg-gray-200 rounded animate-pulse"></div>
            </div>

            <!-- Actual Name and Email -->
            <div id="text-content" class="flex flex-col items-center hidden">
                <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2 mt-2">
                    <span id="display-username">Loading...</span>
                    <i class="fa-solid fa-circle-check text-blue-500 text-sm"></i>
                </h2>
                <p class="text-sm text-gray-500 font-medium mt-1" id="display-email">loading...</p>

                <span id="auth-badge"
                    class="mt-3 px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-semibold flex items-center gap-1">
                    <i class="fa-solid fa-envelope text-sm mt-px"></i> Email Authenticated
                </span>
            </div>
        </div>
    </section>  

    <!-- Achievements Section -->
    <section class="px-6 mt-6 animate-slide-up delay-150">
        <h3
            class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3 px-2 flex justify-between items-center">
            <span>Achievements</span>
            <span id="profile-achievements-count" class="text-[var(--primary)] theme-text-update">0/10</span>
        </h3>
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <!-- max-h-[175px] allows exactly 2 rows of items (approx 80px each + 16px gap). Added overflow-y-auto for scrolling -->
            <div class="grid grid-cols-4 sm:grid-cols-5 gap-y-5 gap-x-2 max-h-[175px] overflow-y-auto overflow-x-hidden pr-2 custom-scrollbar"
                id="profile-achievements-grid">
                <!-- Populated dynamically -->
            </div>
        </div>
    </section>

    <!-- Profile Updates List -->
    <section class="px-6 mt-6 animate-slide-up delay-200">
        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3 px-2">Account Options</h3>
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">

            <!-- Edit Username -->
            <button onclick="editUsername()"
                class="w-full px-5 py-4 flex items-center justify-between border-b border-gray-100 hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-regular fa-id-badge"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">Edit Username</h4>
                        <p class="text-xs font-medium text-gray-500">Change your display name</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>
            <!-- Theme Toggle -->
            <button onclick="showThemeModal()"
                class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-palette"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">App Theme</h4>
                        <p class="text-xs font-medium text-gray-500">Choose your color mode</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>

            <!-- Reset Password -->
            <button onclick="resetPassword()"
                class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-envelope-open-text"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">Reset Password</h4>
                        <p class="text-xs font-medium text-gray-500">Send reset link to email</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>

              <!-- Rate App -->
                    <button onclick="showRatingModal()"
                    class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group border-b border-gray-100">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-10 h-10 rounded-full bg-yellow-50 text-yellow-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-star"></i>
                            </div>
                            <div>
                                <h4 class="text-base font-semibold text-gray-900">Rate App</h4>
                                <p class="text-xs font-medium text-gray-500">Give us your feedback</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-300"></i>
                    </button>

            <!-- Log Out -->
            <button onclick="logout()"
                class="w-full px-5 py-4 flex items-center justify-between hover:bg-red-50 active:bg-red-100 transition-all active:scale-[0.98] text-left group">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-red-600">Log Out</h4>
                        <p class="text-xs font-medium text-red-400">Securely sign out</p>
                    </div>
                </div>
            </button>

        </div>
    </section>

    <!-- Tab Bar -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex items-center justify-between z-50 shadow-[0_-4px_25px_rgba(0,0,0,0.05)] text-gray-400">
        <a href="index.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="calendar.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-calendar text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Calendar</span>
        </a>

        <div class="w-16 flex justify-center relative -top-6">
            <a href="add_habit.html"
                class="w-14 h-14 bg-[var(--primary)] theme-bg-update rounded-full flex items-center justify-center text-white text-2xl shadow-[0_8px_20px_-6px_rgba(0,0,0,0.5)] transform transition hover:scale-105 active:scale-95 border-4 border-white">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>

        <a href="statistics.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Stats</span>
        </a>
        <a href="profile.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16 text-[var(--primary)] theme-text-update">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Profile</span>
        </a>
    </nav>

    <script src="../js/mysql-api.js"></script>
    <script src="../js/habits.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let _currentUser = null;

         // === Rating Modal ===
        function showRatingModal() {
            let modal = document.getElementById('rating-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'rating-modal';
                modal.className = 'fixed inset-0 bg-gray-900/40 z-[120] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-6 backdrop-blur-sm';
                modal.innerHTML = `
                    <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-300 popup-content" id="rating-modal-box">
                        <h3 class="text-2xl font-extrabold text-gray-900 text-center mb-2">Enjoying HabitFlow?</h3>
                        <p class="text-center text-gray-500 text-sm mb-6">Your feedback helps us improve.</p>
                        
                        <div class="flex justify-center gap-2 mb-6" id="star-rating-container">
                            <button type="button" class="star-btn text-gray-300 hover:text-yellow-400 hover:scale-110 transition-all text-4xl" data-value="1"><i class="fa-solid fa-star"></i></button>
                            <button type="button" class="star-btn text-gray-300 hover:text-yellow-400 hover:scale-110 transition-all text-4xl" data-value="2"><i class="fa-solid fa-star"></i></button>
                            <button type="button" class="star-btn text-gray-300 hover:text-yellow-400 hover:scale-110 transition-all text-4xl" data-value="3"><i class="fa-solid fa-star"></i></button>
                            <button type="button" class="star-btn text-gray-300 hover:text-yellow-400 hover:scale-110 transition-all text-4xl" data-value="4"><i class="fa-solid fa-star"></i></button>
                            <button type="button" class="star-btn text-gray-300 hover:text-yellow-400 hover:scale-110 transition-all text-4xl" data-value="5"><i class="fa-solid fa-star"></i></button>
                        </div>

                        <div class="mb-6">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Tell us more (optional)</label>
                            <textarea id="rating-feedback" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 theme-focus-ring transition shadow-sm h-24 resize-none" placeholder="What do you like or dislike?"></textarea>
                        </div>

                        <div class="flex gap-3 mt-6">
                            <button type="button" class="flex-1 py-3 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors" id="rating-modal-close">Back</button>
                            <button type="button" class="flex-1 py-3 px-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl transition-colors shadow-md theme-bg-update" id="rating-modal-submit" style="background-color: var(--primary);">Submit</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);

                // Star rating logic
                const stars = modal.querySelectorAll('.star-btn');
                let selectedRating = 0;

                const updateStars = (hoverValue) => {
                    const value = hoverValue !== undefined ? hoverValue : selectedRating;
                    stars.forEach(star => {
                        if (parseInt(star.dataset.value) <= value) {
                            star.classList.add('text-yellow-400');
                            star.classList.remove('text-gray-300');
                        } else {
                            star.classList.remove('text-yellow-400');
                            star.classList.add('text-gray-300');
                        }
                    });
                };

                stars.forEach(star => {
                    star.addEventListener('mouseenter', () => updateStars(parseInt(star.dataset.value)));
                    star.addEventListener('mouseleave', () => updateStars());
                    star.addEventListener('click', () => {
                        selectedRating = parseInt(star.dataset.value);
                        updateStars();
                    });
                });

                // Close handling
                const closeModal = () => {
                    modal.classList.remove('opacity-100', 'pointer-events-auto');
                    modal.classList.add('opacity-0', 'pointer-events-none');
                    document.getElementById('rating-modal-box').classList.remove('scale-100');
                    document.getElementById('rating-modal-box').classList.add('scale-95');
                    setTimeout(() => {
                        selectedRating = 0;
                        updateStars();
                        document.getElementById('rating-feedback').value = '';
                    }, 300);
                };

                document.getElementById('rating-modal-close').onclick = closeModal;

                // ─── Submit: Kirim ke MySQL via API ──────────────────────────
                document.getElementById('rating-modal-submit').onclick = async () => {
                    if (selectedRating === 0) {
                        showToast("Pilih rating bintang terlebih dahulu!", "error");
                        return;
                    }

                    const submitBtn = document.getElementById('rating-modal-submit');
                    const feedbackText = document.getElementById('rating-feedback').value;

                    // Loading state
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Sending...';

                    try {
                        // Panggil fungsi dari mysql-api.js
                        const result = await submitFeedback(selectedRating, feedbackText);

                        if (result.success) {
                            closeModal();
                            setTimeout(() => {
                                showToast(result.message || "Terima kasih atas feedback-mu! ⭐");
                            }, 300);
                        } else {
                            showToast(result.message || "Gagal mengirim feedback.", "error");
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = 'Submit';
                        }
                    } catch (err) {
                        console.error('Submit feedback error:', err);
                        showToast("Terjadi kesalahan. Coba lagi.", "error");
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = 'Submit';
                    }
                };
            }

            // Show animation
            setTimeout(() => {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modal.classList.add('opacity-100', 'pointer-events-auto');
                document.getElementById('rating-modal-box').classList.remove('scale-95');
                document.getElementById('rating-modal-box').classList.add('scale-100');
            }, 10);
        }

        // === Theme Selector Modal ===
        function showThemeModal() {
            let modal = document.getElementById('theme-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'theme-modal';
                modal.className = 'fixed inset-0 bg-gray-900/40 z-[120] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-6 backdrop-blur-sm';
                modal.innerHTML = `
                    <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300 popup-content" id="theme-modal-box">
                        <h3 class="text-xl font-bold text-gray-900 text-center mb-6">Choose Your Theme</h3>
                        
                        <div class="space-y-3">
                            <!-- Green Theme -->
                            <button type="button" class="theme-option w-full p-4 rounded-2xl border-2 transition-all hover:scale-105 active:scale-95" data-theme="green" style="border-color: #10B981; background-color: rgba(16, 185, 129, 0.05);">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-full flex items-center justify-center text-white" style="background: linear-gradient(135deg, #10B981 0%, #6ee7b7 100%);">
                                        <i class="fa-solid fa-leaf text-lg"></i>
                                    </div>
                                    <div class="text-left">
                                        <h4 class="font-bold text-gray-900">Fresh Green</h4>
                                        <p class="text-xs text-gray-500">Calm & Natural</p>
                                    </div>
                                    <i class="fa-solid fa-check ml-auto text-lg text-green-500 theme-check-green hidden"></i>
                                </div>
                            </button>

                            <!-- Blue Theme -->
                            <button type="button" class="theme-option w-full p-4 rounded-2xl border-2 transition-all hover:scale-105 active:scale-95" data-theme="blue" style="border-color: #5BA4C9; background-color: rgba(91, 164, 201, 0.05);">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-full flex items-center justify-center text-white" style="background: linear-gradient(135deg, #5BA4C9 0%, #7DD3FC 100%);">
                                        <i class="fa-solid fa-droplet text-lg"></i>
                                    </div>
                                    <div class="text-left">
                                        <h4 class="font-bold text-gray-900">Sky Blue</h4>
                                        <p class="text-xs text-gray-500">Light & Fresh</p>
                                    </div>
                                    <i class="fa-solid fa-check ml-auto text-lg text-blue-500 theme-check-blue hidden"></i>
                                </div>
                            </button>
                        </div>

                        <button type="button" class="w-full mt-6 py-3 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors" id="theme-modal-close">Done</button>
                    </div>
                `;
                document.body.appendChild(modal);
            }

            const currentTheme = document.documentElement.getAttribute('data-theme') || 'green';

            // Update check marks
            document.querySelectorAll('.theme-check-green, .theme-check-blue').forEach(el => el.classList.add('hidden'));
            if (currentTheme === 'green') document.querySelector('.theme-check-green')?.classList.remove('hidden');
            else if (currentTheme === 'blue') document.querySelector('.theme-check-blue')?.classList.remove('hidden');

            // Theme option handlers
            const themeOptions = document.querySelectorAll('.theme-option');
            themeOptions.forEach(option => {
                option.onclick = (e) => {
                    const selectedTheme = option.getAttribute('data-theme');
                    document.documentElement.setAttribute('data-theme', selectedTheme);
                    localStorage.setItem('theme', selectedTheme);

                    // Update gradient
                    const bgGradient = document.getElementById('theme-bg-gradient');
                    if (bgGradient) {
                        if (selectedTheme === 'blue') {
                            bgGradient.style.background = 'linear-gradient(180deg, #4480ba 0%, #acc9e6 50%, rgba(255,255,255,0) 100%)';
                        } else {
                            bgGradient.style.background = 'linear-gradient(180deg, #10B981 0%, #6ee7b7 50%, rgba(255,255,255,0) 100%)';
                        }
                    }

                    // Update check marks
                    document.querySelectorAll('.theme-check-green, .theme-check-blue').forEach(el => el.classList.add('hidden'));
                    if (selectedTheme === 'green') document.querySelector('.theme-check-green')?.classList.remove('hidden');
                    else if (selectedTheme === 'blue') document.querySelector('.theme-check-blue')?.classList.remove('hidden');

                    // Dispatch event
                    document.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: selectedTheme } }));

                    showToast(`Theme changed to ${selectedTheme.charAt(0).toUpperCase() + selectedTheme.slice(1)}!`);
                };
            });

            const closeBtn = document.getElementById('theme-modal-close');
            closeBtn.onclick = () => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('theme-modal-box').classList.remove('scale-100');
                document.getElementById('theme-modal-box').classList.add('scale-95');
            };

            // Open modal with animation
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('theme-modal-box').classList.remove('scale-95');
            document.getElementById('theme-modal-box').classList.add('scale-100');
        }        // === Edit Username Modal System ===
        function showEditUsernameModal(currentUsername) {
            let modal = document.getElementById('edit-username-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'edit-username-modal';
                modal.className = 'fixed inset-0 bg-gray-900/40 z-[120] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-6 backdrop-blur-sm';
                modal.innerHTML = `
                    <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300 popup-content" id="edit-username-box">
                        <div class="w-14 h-14 rounded-full flex items-center justify-center text-2xl mb-4 mx-auto" id="edit-username-icon" style="background-color: rgba(16, 185, 129, 0.1); color: #10B981;">
                            <i class="fa-solid fa-id-badge"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 text-center mb-2">Edit Username</h3>
                        <p class="text-gray-500 text-center text-sm mb-6">Enter your new display name</p>
                        <div class="mb-6">
                            <input type="text" id="edit-username-input" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-[var(--primary)] transition-colors text-gray-900 font-medium placeholder-gray-400" placeholder="Enter new username" autocomplete="off">
                        </div>
                        <div class="flex gap-3">
                            <button type="button" class="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors" id="edit-username-cancel">Cancel</button>
                            <button type="button" class="flex-1 py-3.5 font-bold rounded-xl transition-colors text-white shadow-md focus:outline-none" id="edit-username-save" style="background-color: var(--primary);">Save</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }

            const inputEl = document.getElementById('edit-username-input');
            inputEl.value = currentUsername;

            const close = () => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('edit-username-box').classList.remove('scale-100');
                document.getElementById('edit-username-box').classList.add('scale-95');
            };

            const saveBtn = document.getElementById('edit-username-save');
            const cancelBtn = document.getElementById('edit-username-cancel');

            // Clear old event listeners by cloning and replacing
            const newSaveBtn = saveBtn.cloneNode(true);
            const newCancelBtn = cancelBtn.cloneNode(true);
            saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
            cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);

            // Get fresh references
            const freshSaveBtn = document.getElementById('edit-username-save');
            const freshCancelBtn = document.getElementById('edit-username-cancel');
            const freshInputEl = document.getElementById('edit-username-input');

            // Setup event listeners
            freshInputEl.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    freshSaveBtn.click();
                }
            };

            freshCancelBtn.onclick = close;
            freshSaveBtn.onclick = async () => {
                const newName = freshInputEl.value.trim();
                if (!newName) {
                    showToast('Username cannot be empty', 'error');
                    return;
                }
                if (newName === currentUsername) {
                    close();
                    return;
                }

                close();
                await updateUsername(newName);
            };

            // Open modal with animation
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('edit-username-box').classList.remove('scale-95');
            document.getElementById('edit-username-box').classList.add('scale-100');

            // Focus input
            setTimeout(() => freshInputEl.focus(), 100);
        }

        async function updateUsername(newName) {
            try {
                // Update UI
                document.getElementById('display-username').innerText = newName;

                // Update di localStorage (MySQL session)
                const stored = localStorage.getItem('currentUser');
                if (stored) {
                    const user = JSON.parse(stored);
                    user.fullName = newName;
                    localStorage.setItem('currentUser', JSON.stringify(user));
                }

                alert(`Nama berhasil diperbarui: ${newName}!`);
            } catch (err) {
                console.error('Update username error:', err);
                alert('Gagal memperbarui nama. Coba lagi.');
            }
        }

        async function editUsername() {
            const currentName = document.getElementById('display-username').innerText;
            showEditUsernameModal(currentName);
        }

        async function resetPassword() {
            if (!_currentUser) return;
            const email = _currentUser.email;
            if (!confirm(`Kirim tautan reset password ke ${email}?`)) return;

            try {
                const response = await fetch('/auth/forgot-password', {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify({ email })
                });
                const result = await response.json();
                alert(result.message || 'Link reset terkirim! Cek email kamu.');
            } catch (err) {
                alert('Gagal mengirim link reset. Cek koneksi ke server.');
            }
        }

        function logout() {
            handleSignOut();
        }

        async function uploadAvatar(file) {
            if (!_currentUser) {
                alert('User tidak ditemukan. Silakan login ulang.');
                return;
            }

            const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showToast('Format tidak didukung. Gunakan JPG, PNG, WEBP, atau GIF.', 'error');
                return;
            }
            if (file.size > 2 * 1024 * 1024) {
                showToast('File terlalu besar. Maksimal 2MB.', 'error');
                return;
            }

            // Tampilkan preview lokal langsung (tanpa upload ke cloud)
            const profileImg = document.getElementById('profile-img');
            const loadingIndicator = document.getElementById('avatar-loading');

            loadingIndicator.classList.remove('hidden');

            try {
                // Baca file sebagai Data URL untuk preview lokal
                const reader = new FileReader();
                reader.onload = (e) => {
                    profileImg.src = e.target.result;
                    // Simpan ke localStorage sebagai base64 (fallback sederhana)
                    localStorage.setItem('avatarDataUrl', e.target.result);
                    showToast('Foto profil berhasil diperbarui!');
                };
                reader.readAsDataURL(file);
            } catch (err) {
                console.error('Avatar preview error:', err);
                showToast('Gagal memuat foto. Coba lagi.', 'error');
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        }

        // Listener ketika user memilih file
        document.getElementById('avatar-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                uploadAvatar(file);
                this.value = ''; // Reset supaya bisa ganti foto lagi
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            // Load user dari localStorage MySQL session
            const storedUser = localStorage.getItem('currentUser');
            
            // Simulasikan delay sedikit agar skeleton terlihat (opsional, bisa dihapus)
            setTimeout(() => {
                let user = null;
                try {
                    if (storedUser) {
                        user = JSON.parse(storedUser);
                        _currentUser = user;
                    }
                } catch (parseErr) {
                    console.error('Error parsing currentUser:', parseErr);
                }

                // Fallback rendering
                const name  = user?.fullName || user?.username || 'Guest';
                const email = user?.email || '-';

                document.getElementById('display-username').innerText = name;
                document.getElementById('display-email').innerText = email;

                // Avatar: cek localStorage cache, fallback ke ui-avatars.com
                const savedAvatar = localStorage.getItem('avatarDataUrl');
                const profileImg  = document.getElementById('profile-img');
                if (savedAvatar) {
                    profileImg.src = savedAvatar;
                } else {
                    profileImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=10B981&color=fff&bold=true`;
                }

                // Auth badge
                const badge = document.getElementById('auth-badge');
                if (badge) {
                    badge.innerHTML = user ? '<i class="fa-solid fa-database text-sm mt-px"></i> MySQL Authenticated' : '<i class="fa-solid fa-user-slash text-sm mt-px"></i> Not Logged In';
                }

                // Hide Skeletons, Show Content
                const avatarSkel = document.getElementById('avatar-skeleton');
                const avatarWrap = document.getElementById('avatar-wrapper');
                const textSkel = document.getElementById('text-skeleton');
                const textContent = document.getElementById('text-content');

                if (avatarSkel) avatarSkel.classList.add('hidden');
                if (avatarWrap) avatarWrap.classList.remove('opacity-0');
                if (textSkel) textSkel.classList.add('hidden');
                if (textContent) textContent.classList.remove('hidden');

                if (!user) {
                    showToast('Sesi tidak ditemukan. Silakan login kembali.', 'error');
                }
            }, 300);

            renderAchievements();
        });

        function renderAchievements() {
            if (typeof getAchievementsData !== 'function') return;
            const achData = getAchievementsData();

            const countEl = document.getElementById('profile-achievements-count');
            if (countEl) countEl.innerText = `${achData.unlockedCount}/${achData.totalCount}`;

            const gridEl = document.getElementById('profile-achievements-grid');
            if (!gridEl) return;

            let html = '';
            achData.achievements.forEach(ach => {
                const opacity = ach.isUnlocked ? 'opacity-100 transform hover:scale-110' : 'opacity-40 grayscale';
                const badgeColor = ach.isUnlocked ? 'bg-[var(--primary)]' : 'bg-gray-200';

                html += `
                    <div class="flex flex-col items-center justify-start gap-1.5 ${opacity} transition-all cursor-pointer" title="${ach.name}: ${ach.description}">
                        <div class="w-12 h-12 rounded-full ${badgeColor} theme-bg-update flex items-center justify-center border-2 border-white shadow-sm overflow-hidden">
                            <img src="../assets/project_logo/${ach.id}.png" alt="Badge" class="w-full h-full object-cover">
                        </div>
                        <span class="text-[9px] font-bold text-center text-gray-600 leading-tight line-clamp-2">${ach.name}</span>
                    </div>
                `;
            });
            gridEl.innerHTML = html;
        }
    </script>
</body>

</html>
