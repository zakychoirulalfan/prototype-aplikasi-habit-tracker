<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981' },
                        blue: { 500: '#5BA4C9' }
                    }
                }
            }
        }
    </script>
</head>

<body class="pb-24 bg-gray-50">

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 flex justify-between items-center animate-slide-up relative z-10">
        <h1 class="text-2xl font-bold text-white">Profile</h1>
    </header>

    <!-- Profile Section -->
    <section class="px-6 mt-4 animate-slide-up delay-100">
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col items-center">

            <div class="relative mb-4 group transition-transform hover:scale-105 active:scale-95 cursor-pointer"
                onclick="document.getElementById('avatar-input').click()">
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-lg relative">
                    <img id="profile-img" src="https://i.pravatar.cc/150?img=11" alt="Profile Name"
                        class="w-full h-full object-cover">
                    <!-- Loading indicator saat upload -->
                    <div id="avatar-loading"
                        class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 transition-opacity duration-300 hidden">
                        <i class="fa-solid fa-spinner fa-spin text-white text-2xl"></i>
                    </div>
                </div>
                <div
                    class="absolute bottom-0 right-0 bg-[var(--primary)] text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white shadow-sm hover:scale-110 transition-transform">
                    <i class="fa-solid fa-camera text-xs"></i>
                </div>
            </div>
            <!-- Tambahkan ini setelah div foto profil -->
            <input type="file" id="avatar-input" accept="image/*" class="hidden">

            <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2 mt-2">
                <span id="display-username">Loading...</span>
                <i class="fa-solid fa-circle-check text-blue-500 text-sm"></i>
            </h2>
            <p class="text-sm text-gray-500 font-medium mt-1" id="display-email">loading...</p>

            <span id="auth-badge"
                class="mt-3 px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-semibold flex items-center gap-1">
                <i class="fa-solid fa-envelope text-sm mt-px"></i> Email Authenticated
            </span>
        </div>
    </section>

    <!-- Profile Updates List -->
    <section class="px-6 mt-6 animate-slide-up delay-200">
        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3 px-2">Account Options</h3>
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">

            <!-- Edit Username -->
            <button onclick="editUsername()"
                class="w-full px-5 py-4 flex items-center justify-between border-b border-gray-100 hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-regular fa-id-badge"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">Edit Username</h4>
                        <p class="text-xs font-medium text-gray-500">Change your display name</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>

            <!-- Theme Toggle -->
            <button onclick="toggleTheme()"
                class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-palette"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">App Theme</h4>
                        <p class="text-xs font-medium text-gray-500">Switch color mode</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>

            <!-- Reset Password -->
            <button onclick="resetPassword()"
                class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-envelope-open-text"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">Reset Password</h4>
                        <p class="text-xs font-medium text-gray-500">Send reset link to email</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>

            <!-- Log Out -->
            <button onclick="logout()"
                class="w-full px-5 py-4 flex items-center justify-between hover:bg-red-50 active:bg-red-100 transition-all active:scale-[0.98] text-left group">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-red-600">Log Out</h4>
                        <p class="text-xs font-medium text-red-400">Securely sign out</p>
                    </div>
                </div>
            </button>

        </div>
    </section>

    <!-- Tab Bar -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex items-center justify-between z-50 shadow-[0_-4px_25px_rgba(0,0,0,0.05)] text-gray-400">
        <a href="index.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="calendar.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-calendar text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Calendar</span>
        </a>

        <div class="w-16 flex justify-center relative -top-6">
            <a href="add_habit.html"
                class="w-14 h-14 bg-[var(--primary)] theme-bg-update rounded-full flex items-center justify-center text-white text-2xl shadow-[0_8px_20px_-6px_rgba(0,0,0,0.5)] transform transition hover:scale-105 active:scale-95 border-4 border-white">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>

        <a href="statistics.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Stats</span>
        </a>
        <a href="profile.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16 text-[var(--primary)] theme-text-update">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Profile</span>
        </a>
    </nav>

    <script src="../js/app.js"></script>
    <script>
        // Mock profile actions
        function editUsername() {
            const currentName = document.getElementById('display-username').innerText;
            const newName = prompt("Enter your new username:", currentName);
            if (newName && newName.trim() !== "") {
                document.getElementById('display-username').innerText = newName.trim();
                alert(`Username updated to ${newName.trim()}!`);
            }
        }

        function resetPassword() {
            if (confirm("Send a password reset link to user@example.com?")) {
                alert("Reset link sent! Please check your email.");
            }
        }

        function logout() {
            handleSignOut();
        }

        async function uploadAvatar(file) {
            if (!_currentUser) {
                showToast('User tidak ditemukan. Silakan login kembali.', 'error');
                return;
            }

            // Validasi tipe file
            const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showToast('Format file tidak didukung. Gunakan JPG, PNG, WEBP, atau GIF.', 'error');
                return;
            }

            // Validasi ukuran file (maks 2MB)
            if (file.size > 2 * 1024 * 1024) {
                showToast('File terlalu besar. Maksimal 2MB.', 'error');
                return;
            }

            // Tampilkan loading state
            const profileImg = document.getElementById('profile-img');
            const loadingIndicator = document.getElementById('avatar-loading');
            const originalSrc = profileImg.src;

            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('opacity-100');
            loadingIndicator.style.opacity = '1';

            try {
                const fileExt = file.name.split('.').pop().toLowerCase();
                const fileName = `${_currentUser.id}_${Date.now()}.${fileExt}`;
                const filePath = `public/${fileName}`;

                // Upload ke Supabase Storage
                const { error: uploadError, data } = await supabaseClient.storage
                    .from('avatars')
                    .upload(filePath, file, { upsert: true });

                if (uploadError) throw uploadError;

                // Ambil URL publik
                const { data: publicData } = supabaseClient.storage
                    .from('avatars')
                    .getPublicUrl(filePath);

                const publicUrl = publicData.publicUrl;

                // Tampilkan foto baru langsung di UI
                profileImg.src = publicUrl;

                // Simpan URL ke tabel profiles di Supabase
                await supabaseClient
                    .from('profiles')
                    .update({ avatar_url: publicUrl })
                    .eq('id', _currentUser.id);

                showToast('Foto profil berhasil diperbarui!', 'success');

            } catch (err) {
                console.error('Upload error:', err);
                showToast('Gagal mengunggah foto. Silakan coba lagi.', 'error');
                // Restore original image on error
                profileImg.src = originalSrc;
            } finally {
                // Sembunyikan loading state
                loadingIndicator.style.opacity = '0';
                setTimeout(() => {
                    loadingIndicator.classList.add('hidden');
                }, 300);
            }
        }

        // Listener ketika user memilih file
        document.getElementById('avatar-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                uploadAvatar(file);
                this.value = ''; // Reset supaya bisa ganti foto lagi
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            // Fetch User Details to display
            if (supabaseClient) {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (user && !userError) {
                    _currentUser = user;
                    const name = user.user_metadata?.full_name || 'User';
                    const email = user.email || 'No email';

                    // Update username dan email di UI
                    document.getElementById('display-username').innerText = name;
                    document.getElementById('display-email').innerText = email;

                    // Cek apakah ada avatar yang sudah disimpan
                    try {
                        const { data: profile, error: profileError } = await supabaseClient
                            .from('profiles')
                            .select('avatar_url')
                            .eq('id', user.id)
                            .single();

                        const profileImg = document.getElementById('profile-img');

                        if (profile?.avatar_url && !profileError) {
                            profileImg.src = profile.avatar_url;
                        } else {
                            // Fallback ke avatar otomatis jika belum ada foto
                            profileImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=10B981&color=fff&bold=true`;
                        }
                    } catch (profileErr) {
                        console.error('Error loading profile:', profileErr);
                        // Gunakan default avatar jika ada error
                        document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=10B981&color=fff&bold=true`;
                    }

                    // Show correct auth provider badge
                    const provider = user.app_metadata?.provider || 'email';
                    const badge = document.getElementById('auth-badge');
                    if (badge) {
                        if (provider === 'google') {
                            badge.innerHTML = '<i class="fa-brands fa-google text-sm mt-px"></i> Google Authenticated';
                        } else {
                            badge.innerHTML = '<i class="fa-solid fa-envelope text-sm mt-px"></i> Email Authenticated';
                        }
                    }
                } else {
                    console.error('Error getting user:', userError);
                    showToast('Gagal memuat profil. Silakan refresh halaman.', 'error');
                }
            }
        });
    </script>
</body>

</html>
