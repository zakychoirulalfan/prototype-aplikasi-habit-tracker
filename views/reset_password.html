<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Set up Supabase Client
        const SUPABASE_URL = 'https://fjbiwrdurcburbaognan.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqYml3cmR1cmNidXJiYW9nbmFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTQxMjEsImV4cCI6MjA5NDE3MDEyMX0.0-X3hAXeyU12eLambrS-pM9MGNbUKoNcINFlANDoKBA';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981', 600: '#059669' },
                        blue: { 500: '#5BA4C9', 600: '#0284C7' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen px-6">

    <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-sm border border-gray-100 animate-slide-up relative overflow-hidden">
        
        <!-- Decorative blob -->
        <div class="absolute -top-16 -right-16 w-32 h-32 rounded-full opacity-10 theme-bg-update" style="background-color: var(--primary);"></div>
        <div class="absolute -bottom-16 -left-16 w-32 h-32 rounded-full opacity-10 theme-bg-update" style="background-color: var(--primary);"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-3xl mb-4 theme-text-update theme-bg-light" style="color: var(--primary); background-color: var(--primary-light);">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Set New Password</h1>
            <p class="text-sm text-gray-500 mt-2">Enter your new password below</p>
        </div>

        <form class="flex flex-col gap-4 relative z-10" id="reset-form">
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="password">New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition" placeholder="••••••••" required minlength="6">
                </div>
                <p class="text-xs text-gray-400 mt-1 ml-1">At least 6 characters</p>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="confirm-password">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="confirm-password" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition" placeholder="••••••••" required minlength="6">
                </div>
            </div>

            <button type="submit" class="w-full py-3 mt-4 text-white font-bold rounded-xl shadow-md transform transition hover:-translate-y-0.5 active:translate-y-0 theme-bg-update" style="background-color: var(--primary);">
                Update Password
            </button>
        </form>

        <!-- Success Message (Hidden by default) -->
        <div id="success-message" class="hidden relative z-10 p-4 mt-6 bg-green-50 border border-green-200 rounded-2xl">
            <div class="flex gap-3">
                <i class="fa-solid fa-circle-check text-green-600 text-xl flex-shrink-0 mt-0.5"></i>
                <div>
                    <h3 class="font-semibold text-green-900">Password updated</h3>
                    <p class="text-sm text-green-700">Your password has been successfully reset. You will be redirected to login shortly.</p>
                </div>
            </div>
        </div>

        <!-- Error Message (Hidden by default) -->
        <div id="error-message" class="hidden relative z-10 p-4 mt-6 bg-red-50 border border-red-200 rounded-2xl">
            <div class="flex gap-3">
                <i class="fa-solid fa-circle-exclamation text-red-600 text-xl flex-shrink-0 mt-0.5"></i>
                <div>
                    <h3 class="font-semibold text-red-900">Error</h3>
                    <p class="text-sm text-red-700" id="error-text"></p>
                </div>
            </div>
        </div>

        <!-- Session expired message -->
        <div id="session-expired" class="hidden relative z-10 p-4 mt-6 bg-yellow-50 border border-yellow-200 rounded-2xl">
            <div class="flex gap-3">
                <i class="fa-solid fa-circle-exclamation text-yellow-600 text-xl flex-shrink-0 mt-0.5"></i>
                <div>
                    <h3 class="font-semibold text-yellow-900">Link expired</h3>
                    <p class="text-sm text-yellow-700">Your reset link has expired. Please <a href="forgot_password.html" class="font-bold underline">request a new one</a>.</p>
                </div>
            </div>
        </div>

        <div class="mt-6 text-center relative z-10">
            <p class="text-sm text-gray-600">
                <a href="login.html" class="font-bold theme-text-update" style="color: var(--primary);">Back to Login</a>
            </p>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Apply initial theme
            updateColors(document.documentElement.getAttribute('data-theme') || 'green');
            
            document.addEventListener('themeChanged', (e) => {
                updateColors(e.detail.theme);
            });

            // Check if user has valid session (from the reset link)
            const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
            
            if (!session && !sessionError) {
                // No session, link probably expired
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('session-expired').classList.remove('hidden');
            }

            document.getElementById('reset-form').addEventListener('submit', handleResetPassword);
        });

        async function handleResetPassword(event) {
            event.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = event.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            const successMsg = document.getElementById('success-message');
            const errorMsg = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            // Reset messages
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');

            // Validate passwords match
            if (password !== confirmPassword) {
                errorText.innerText = 'Passwords do not match.';
                errorMsg.classList.remove('hidden');
                return;
            }

            // Show loading
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';
            btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: password
                });

                if (error) {
                    errorText.innerText = error.message || 'Failed to update password. Please try again.';
                    errorMsg.classList.remove('hidden');
                    btn.innerText = originalText;
                    btn.disabled = false;
                } else {
                    // Show success message
                    successMsg.classList.remove('hidden');
                    btn.disabled = true;
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } catch (err) {
                errorText.innerText = err.message || 'An unexpected error occurred.';
                errorMsg.classList.remove('hidden');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function updateColors(theme) {
            const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
            const primaryLight = theme === 'blue' ? '#E0F2FE' : '#D1FAE5';
            
            document.querySelectorAll('.theme-bg-update').forEach(el => el.style.backgroundColor = primary);
            document.querySelectorAll('.theme-text-update').forEach(el => el.style.color = primary);
            document.querySelectorAll('.theme-bg-light').forEach(el => el.style.backgroundColor = primaryLight);
            
            document.querySelectorAll('.theme-focus-ring').forEach(el => {
                el.classList.remove('focus:ring-green-500', 'focus:ring-blue-500');
                el.classList.add(theme === 'blue' ? 'focus:ring-blue-500' : 'focus:ring-green-500');
            });
        }
    </script>
</body>
</html>
