<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Habit - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981', 600: '#059669' },
                        blue: { 500: '#5BA4C9', 600: '#0284C7' }
                    }
                }
            }
        }
    </script>
    <style>
        .category-btn.active span {
            color: white;
        }
        .category-btn.active div {
            background-color: transparent;
            color: white;
        }
        .evaluation-option input:checked ~ div > .radio-inner {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 flex justify-between items-center bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 animate-slide-up">
        <a href="index.html" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-700 hover:bg-gray-100/50 transition focus:outline-none">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="text-xl font-bold text-gray-900">Edit Habit</h1>
        <div class="w-10 h-10"></div> <!-- Placeholder for alignment -->
    </header>

    <div class="px-6 py-6 animate-slide-up flex flex-col gap-8">
        
        <!-- Category Options -->
        <section>
            <h2 class="text-lg font-bold text-gray-900 mb-4">Select Category</h2>
            <div class="grid grid-cols-3 gap-3" id="category-container">
                <!-- Art -->
                <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="art">
                    <div class="w-10 h-10 rounded-full bg-pink-50 text-pink-500 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-palette"></i></div>
                    <span class="text-xs font-bold text-gray-700 transition-colors">Art</span>
                </button>
                <!-- Study -->
                <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="study">
                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-book"></i></div>
                    <span class="text-xs font-bold text-gray-700 transition-colors">Study</span>
                </button>
                <!-- Entertainment -->
                <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="entertainment">
                    <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-gamepad"></i></div>
                    <span class="text-xs font-bold text-gray-700 transition-colors">Entertain</span>
                </button>
                <!-- Meditation -->
                <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="meditation">
                    <div class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-spa"></i></div>
                    <span class="text-xs font-bold text-gray-700 transition-colors">Meditate</span>
                </button>
                <!-- Finance -->
                <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="finance">
                    <div class="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-wallet"></i></div>
                    <span class="text-xs font-bold text-gray-700 transition-colors">Finance</span>
                </button>
                <!-- Sport -->
                <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="sport">
                    <div class="w-10 h-10 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-basketball"></i></div>
                    <span class="text-xs font-bold text-gray-700 transition-colors">Sport</span>
                </button>
                <!-- Health -->
                <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="health">
                    <div class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-heart-pulse"></i></div>
                    <span class="text-xs font-bold text-gray-700 transition-colors">Health</span>
                </button>
                <!-- Work -->
                <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="work">
                    <div class="w-10 h-10 rounded-full bg-gray-100 text-gray-700 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-briefcase"></i></div>
                    <span class="text-xs font-bold text-gray-700 transition-colors">Work</span>
                </button>
                <!-- Custom -->
                <button type="button" class="category-btn bg-white border border-dashed border-gray-300 rounded-2xl py-3 px-2 flex flex-col items-center justify-center gap-2 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="custom">
                    <div class="w-10 h-10 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center text-lg transition-colors"><i class="fa-solid fa-plus"></i></div>
                    <span class="text-xs font-bold text-gray-500 transition-colors">Custom</span>
                </button>
            </div>
            
            <!-- Custom Category Inputs (Hidden by default) -->
            <div id="custom-category-details" class="mt-4 p-5 bg-white rounded-2xl shadow-sm border border-gray-100 hidden flex-col gap-4 animate-slide-up">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="custom-cat-name">Custom Category Name</label>
                    <input type="text" id="custom-cat-name" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition" placeholder="e.g., Pet Care">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-2 ml-1">Select Custom Icon</label>
                    <div class="flex flex-wrap gap-3 pb-2" id="custom-icon-selector">
                        <button type="button" class="icon-btn active w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors" data-icon="fa-paw"><i class="fa-solid fa-paw"></i></button>
                        <button type="button" class="icon-btn w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors" data-icon="fa-music"><i class="fa-solid fa-music"></i></button>
                        <button type="button" class="icon-btn w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors" data-icon="fa-plane"><i class="fa-solid fa-plane"></i></button>
                        <button type="button" class="icon-btn w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors" data-icon="fa-camera"><i class="fa-solid fa-camera"></i></button>
                        <button type="button" class="icon-btn w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors" data-icon="fa-utensils"><i class="fa-solid fa-utensils"></i></button>
                        <button type="button" class="icon-btn w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors" data-icon="fa-bicycle"><i class="fa-solid fa-bicycle"></i></button>
                        <button type="button" class="icon-btn w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors" data-icon="fa-seedling"><i class="fa-solid fa-seedling"></i></button>
                        <button type="button" class="icon-btn w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors" data-icon="fa-star"><i class="fa-solid fa-star"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Evaluation Method -->
        <section>
            <h2 class="text-lg font-bold text-gray-900 mb-4">How do you want to evaluate your progress?</h2>
            <div class="flex flex-col gap-3">
                <label class="relative flex items-center p-4 bg-white rounded-2xl shadow-sm border border-gray-100 cursor-pointer evaluation-option transition-all border-container">
                    <input type="radio" name="evaluation" value="checklist" class="peer sr-only" checked>
                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg mr-4 shrink-0 transition-all">
                        <i class="fa-solid fa-list-check"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-sm text-gray-900">With Checklist</h3>
                        <p class="text-xs text-gray-500 mt-0.5">Simple completed or not completed</p>
                    </div>
                    <div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center ml-2 border-target shrink-0 transition-all">
                        <div class="radio-inner w-2.5 h-2.5 rounded-full bg-[var(--primary)] opacity-0 transition-opacity theme-bg-update"></div>
                    </div>
                </label>

                <label class="relative flex items-center p-4 bg-white rounded-2xl shadow-sm border border-gray-100 cursor-pointer evaluation-option transition-all border-container">
                    <input type="radio" name="evaluation" value="numeric" class="peer sr-only">
                    <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-lg mr-4 shrink-0 transition-all">
                        <i class="fa-solid fa-hashtag"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-sm text-gray-900">With Numeric Value</h3>
                        <p class="text-xs text-gray-500 mt-0.5">Track amounts like pages read</p>
                    </div>
                    <div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center ml-2 border-target shrink-0 transition-all">
                        <div class="radio-inner w-2.5 h-2.5 rounded-full bg-[var(--primary)] opacity-0 transition-opacity theme-bg-update"></div>
                    </div>
                </label>

                <label class="relative flex items-center p-4 bg-white rounded-2xl shadow-sm border border-gray-100 cursor-pointer evaluation-option transition-all border-container">
                    <input type="radio" name="evaluation" value="timer" class="peer sr-only">
                    <div class="w-10 h-10 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center text-lg mr-4 shrink-0 transition-all">
                        <i class="fa-solid fa-stopwatch"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-sm text-gray-900">With Timer</h3>
                        <p class="text-xs text-gray-500 mt-0.5">Track total time spent on your habit</p>
                    </div>
                    <div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center ml-2 border-target shrink-0 transition-all">
                        <div class="radio-inner w-2.5 h-2.5 rounded-full bg-[var(--primary)] opacity-0 transition-opacity theme-bg-update"></div>
                    </div>
                </label>
            </div>

            <!-- Evaluation Preview Widget -->
            <div id="eval-preview" class="mt-4 hidden">
                <!-- Numeric Preview -->
                <div id="numeric-preview" class="hidden p-4 bg-white rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-xs font-semibold text-gray-500 mb-3 uppercase tracking-wide">Counter Preview</p>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-semibold text-gray-700">Your progress</span>
                        <div class="flex items-center gap-3">
                            <!-- Minus button -->
                            <button type="button" id="preview-minus"
                                class="w-9 h-9 rounded-full border-2 flex items-center justify-center text-sm transition-colors"
                                style="border-color: var(--primary); color: var(--primary);"
                                onmouseenter="this.style.backgroundColor='var(--primary)';this.style.color='white';"
                                onmouseleave="this.style.backgroundColor='';this.style.color='var(--primary)';">
                                <i class="fa-solid fa-minus text-xs"></i>
                            </button>
                            <!-- Number circle -->
                            <div id="preview-circle"
                                class="w-12 h-12 rounded-full border-2 flex items-center justify-center transition-all"
                                style="border-color: var(--primary);">
                                <input type="number" id="preview-value"
                                    class="w-full h-full bg-transparent text-center font-bold text-base focus:outline-none"
                                    style="-moz-appearance: textfield; appearance: textfield; color: var(--primary);"
                                    value="0" min="0">
                            </div>
                            <!-- Plus button -->
                            <button type="button" id="preview-plus"
                                class="w-9 h-9 rounded-full border-2 flex items-center justify-center text-sm transition-colors"
                                style="border-color: var(--primary); color: var(--primary);"
                                onmouseenter="this.style.backgroundColor='var(--primary)';this.style.color='white';"
                                onmouseleave="this.style.backgroundColor='';this.style.color='var(--primary)';">
                                <i class="fa-solid fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Unit input -->
                    <div class="mt-3">
                        <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="habitUnit">Unit Label <span class="font-normal text-gray-400">(optional)</span></label>
                        <input type="text" id="habitUnit"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition"
                            placeholder="e.g., glasses, pages, reps">
                    </div>
                </div>
            </div>
        </section>
        
        <form id="edit-habit-form" class="flex flex-col gap-8 mb-6">
            <!-- Define Your Habit -->
            <section>
                <h2 class="text-lg font-bold text-gray-900 mb-4">Define Your Habit</h2>
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="habitName">Habit Name</label>
                        <input type="text" id="habitName" required class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition shadow-sm" placeholder="e.g., Drink Water">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="habitGoals">Goals</label>
                        <input type="text" id="habitGoals" required class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition shadow-sm" placeholder="e.g., 8 glasses daily">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="habitDescription">Description</label>
                        <textarea id="habitDescription" required class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition shadow-sm h-28 resize-none" placeholder="Add some details about your habit..."></textarea>
                    </div>
                </div>
            </section>

            <!-- Submit Button -->
            <div class="pt-2">
                <button type="submit" class="w-full py-4 text-white font-bold text-lg rounded-2xl shadow-lg transform transition hover:-translate-y-1 active:translate-y-0 theme-bg-update" style="background-color: var(--primary);">
                    Save Changes
                </button>
            </div>
        </form>
    </div>

    <script src="../js/habits.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Wait slightly for app.js theme to load
            setTimeout(() => {
                 updateLocalColors(document.documentElement.getAttribute('data-theme') || 'green');
            }, 50);
            
            document.addEventListener('themeChanged', (e) => {
                updateLocalColors(e.detail.theme);
            });

            // Category Selection
            const catBtns = document.querySelectorAll('.category-btn');
            const customDetails = document.getElementById('custom-category-details');
            
            catBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    catBtns.forEach(b => {
                        b.classList.remove('active');
                        b.style.backgroundColor = '';
                        b.style.borderColor = '';
                    });
                    
                    btn.classList.add('active');
                    
                    const theme = document.documentElement.getAttribute('data-theme') || 'green';
                    const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
                    
                    btn.style.backgroundColor = primary;
                    btn.style.borderColor = primary;
                    
                    if(btn.dataset.cat === 'custom') {
                        customDetails.classList.remove('hidden');
                        customDetails.classList.add('flex');
                    } else {
                        customDetails.classList.add('hidden');
                        customDetails.classList.remove('flex');
                    }
                });
            });

            if(catBtns.length > 0) catBtns[0].click();

            // Custom Icon Selection
            const iconBtns = document.querySelectorAll('.icon-btn');
            iconBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    iconBtns.forEach(b => {
                        b.classList.remove('active');
                        b.style.backgroundColor = '';
                        b.style.borderColor = '';
                        b.style.color = '';
                    });
                    btn.classList.add('active');
                    
                    const theme = document.documentElement.getAttribute('data-theme') || 'green';
                    const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
                    
                    btn.style.backgroundColor = primary;
                    btn.style.borderColor = primary;
                    btn.style.color = 'white';
                });
            });

            if(iconBtns.length > 0) iconBtns[0].click(); // Activate first icon

            // Evaluation method highlighting + preview widget toggle
            const evalOptions = document.querySelectorAll('.evaluation-option');
            const evalPreview = document.getElementById('eval-preview');
            const numericPreview = document.getElementById('numeric-preview');

            // Preview counter state
            let previewCount = 0;
            const previewValueEl = document.getElementById('preview-value');
            const previewCircle = document.getElementById('preview-circle');

            function updatePreviewCircle(val) {
                previewCount = Math.max(0, val);
                previewValueEl.value = previewCount;
                if (previewCount > 0) {
                    previewCircle.style.backgroundColor = 'var(--primary)';
                    previewValueEl.style.color = 'white';
                } else {
                    previewCircle.style.backgroundColor = '';
                    previewValueEl.style.color = 'var(--primary)';
                }
            }

            document.getElementById('preview-minus').addEventListener('click', () => updatePreviewCircle(previewCount - 1));
            document.getElementById('preview-plus').addEventListener('click', () => updatePreviewCircle(previewCount + 1));
            previewValueEl.addEventListener('input', () => {
                const v = parseInt(previewValueEl.value) || 0;
                updatePreviewCircle(v);
            });

            const updateEvalColors = () => {
                const theme = document.documentElement.getAttribute('data-theme') || 'green';
                const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
                const lightPrimary = theme === 'blue' ? '#f0f9ff' : '#f0fdf4';
                
                evalOptions.forEach(opt => {
                    const input = opt.querySelector('input');
                    const innerBorder = opt.querySelector('.border-target');
                    
                    if(input.checked) {
                        opt.style.borderColor = primary;
                        opt.style.backgroundColor = lightPrimary;
                        if(innerBorder) innerBorder.style.borderColor = primary;
                    } else {
                        opt.style.borderColor = '';
                        opt.style.backgroundColor = '';
                        if(innerBorder) innerBorder.style.borderColor = '';
                    }
                });

                // Show/hide preview widget
                const selectedEval = document.querySelector('.evaluation-option input:checked')?.value;
                if (selectedEval === 'numeric') {
                    evalPreview.classList.remove('hidden');
                    numericPreview.classList.remove('hidden');
                    updatePreviewCircle(previewCount);
                } else {
                    evalPreview.classList.add('hidden');
                    numericPreview.classList.add('hidden');
                }
            };

            evalOptions.forEach(opt => {
                opt.querySelector('input').addEventListener('change', updateEvalColors);
            });
            setTimeout(updateEvalColors, 50);

            // Fetch habit data if ID is passed
            const urlParams = new URLSearchParams(window.location.search);
            const habitId = urlParams.get('id');
            let editingHabit = null;

            if (habitId) {
                const habits = JSON.parse(localStorage.getItem('habits') || '[]');
                editingHabit = habits.find(h => h.id === habitId);
                
                if (editingHabit) {
                    // Fill inputs
                    document.getElementById('habitName').value = editingHabit.name || '';
                    document.getElementById('habitGoals').value = editingHabit.goals || '';
                    document.getElementById('habitDescription').value = editingHabit.description || '';
                    if (editingHabit.unit) {
                        const unitEl = document.getElementById('habitUnit');
                        if(unitEl) unitEl.value = editingHabit.unit;
                    }

                    // Select evaluation
                    const evalInput = document.querySelector(`.evaluation-option input[value="${editingHabit.evaluation}"]`);
                    if (evalInput) evalInput.checked = true;
                    updateEvalColors();

                    // Select category natively or via custom logic
                    // This is simple: just map common categories lowercase
                    let catMatched = false;
                    catBtns.forEach(btn => {
                        if (btn.dataset.cat.toLowerCase() === editingHabit.category.toLowerCase()) {
                            btn.click();
                            catMatched = true;
                        }
                    });
                    
                    if (!catMatched) {
                        const customBtn = document.querySelector('.category-btn[data-cat="custom"]');
                        if (customBtn) customBtn.click();
                        document.getElementById('custom-cat-name').value = editingHabit.category;
                        // Try matching icon
                        const htmlString = editingHabit.iconHtml;
                        const iconMatch = htmlString && htmlString.match(/fa-([a-z-]+)/);
                        if(iconMatch) {
                            const iconClass = `fa-${iconMatch[1]}`;
                            const iconBtn = document.querySelector(`.icon-btn[data-icon="${iconClass}"]`);
                            if(iconBtn) iconBtn.click();
                        }
                    }
                }
            }

            // Submission logic
            document.getElementById('edit-habit-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!editingHabit) {
                    showToast("Habit ID missing or invalid!", "error");
                    setTimeout(() => window.location.href = 'index.html', 1500);
                    return;
                }

                const btn = e.target.querySelector('button[type="submit"]');
                const originalContent = btn.innerHTML;
                
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
                btn.disabled = true;

                // Gather data
                const activeCatBtn = document.querySelector('.category-btn.active');
                const catType = activeCatBtn ? activeCatBtn.dataset.cat : 'study';
                let catName = activeCatBtn ? activeCatBtn.querySelector('span').innerText : 'Study';
                let catIconHTML = activeCatBtn ? activeCatBtn.querySelector('div').innerHTML : '<i class="fa-solid fa-book"></i>';
                
                // If custom
                if (catType === 'custom') {
                    const customNameVal = document.getElementById('custom-cat-name').value;
                    if (customNameVal) catName = customNameVal;
                    const activeIconBtn = document.querySelector('.icon-btn.active');
                    if (activeIconBtn) catIconHTML = activeIconBtn.innerHTML;
                }

                const evalType = document.querySelector('.evaluation-option input:checked').value;
                const habitName = document.getElementById('habitName').value;
                const habitGoals = document.getElementById('habitGoals').value;
                const habitDesc = document.getElementById('habitDescription').value;
                const habitUnit = document.getElementById('habitUnit')?.value || '';

                // Update habit object
                editingHabit.name = habitName;
                editingHabit.goals = habitGoals;
                editingHabit.description = habitDesc;
                editingHabit.category = catName;
                editingHabit.iconHtml = catIconHTML;
                editingHabit.evaluation = evalType;
                editingHabit.unit = habitUnit;

                // Update in Supabase using UUID
                await updateHabitInSupabase(editingHabit.id, editingHabit);

                // Update localStorage cache
                const existingHabits = getHabits();
                const idx = existingHabits.findIndex(h => h.id === editingHabit.id);
                if (idx !== -1) {
                    existingHabits[idx] = editingHabit;
                    saveHabitsCache(existingHabits);
                }

                setTimeout(() => {
                    showToast("Habit updated successfully!");
                    setTimeout(() => window.location.href = "index.html", 1000);
                }, 300);
            });
        });

        function updateLocalColors(theme) {
            const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
            const lightPrimary = theme === 'blue' ? '#f0f9ff' : '#f0fdf4';
            
            document.querySelectorAll('.theme-bg-update').forEach(el => el.style.backgroundColor = primary);
            
            const activeCat = document.querySelector('.category-btn.active');
            if (activeCat) {
                activeCat.style.backgroundColor = primary;
                activeCat.style.borderColor = primary;
            }
            
            const activeIcon = document.querySelector('.icon-btn.active');
            if (activeIcon) {
                activeIcon.style.backgroundColor = primary;
                activeIcon.style.borderColor = primary;
            }

            document.querySelectorAll('.evaluation-option input:checked').forEach(input => {
                const opt = input.closest('.evaluation-option');
                opt.style.borderColor = primary;
                opt.style.backgroundColor = lightPrimary;
                
                const innerBorder = opt.querySelector('.border-target');
                if(innerBorder) innerBorder.style.borderColor = primary;
            });
            
            document.querySelectorAll('.theme-focus-ring').forEach(el => {
                el.classList.remove('focus:ring-green-500', 'focus:ring-blue-500');
                el.classList.add(theme === 'blue' ? 'focus:ring-blue-500' : 'focus:ring-green-500');
            });
        }
    </script>
</body>
</html>
