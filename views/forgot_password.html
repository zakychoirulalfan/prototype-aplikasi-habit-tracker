<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Set up Supabase Client
        const SUPABASE_URL = 'https://fjbiwrdurcburbaognan.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqYml3cmR1cmNidXJiYW9nbmFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTQxMjEsImV4cCI6MjA5NDE3MDEyMX0.0-X3hAXeyU12eLambrS-pM9MGNbUKoNcINFlANDoKBA';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981', 600: '#059669' },
                        blue: { 500: '#5BA4C9', 600: '#0284C7' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen px-6">

    <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-sm border border-gray-100 animate-slide-up relative overflow-hidden">
        
        <!-- Decorative blob -->
        <div class="absolute -top-16 -right-16 w-32 h-32 rounded-full opacity-10 theme-bg-update" style="background-color: var(--primary);"></div>
        <div class="absolute -bottom-16 -left-16 w-32 h-32 rounded-full opacity-10 theme-bg-update" style="background-color: var(--primary);"></div>

        <div class="text-center mb-8 relative z-10">
            <a href="login.html" class="inline-block mb-4 w-10 h-10 rounded-full flex items-center justify-center text-gray-700 hover:bg-gray-100/50 transition">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-900">Reset Your Password</h1>
            <p class="text-sm text-gray-500 mt-2">Enter your email to receive a password reset link</p>
        </div>

        <form class="flex flex-col gap-4 relative z-10" id="forgot-form">
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="email">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="email" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition" placeholder="you@example.com" required>
                </div>
            </div>

            <button type="submit" class="w-full py-3 mt-4 text-white font-bold rounded-xl shadow-md transform transition hover:-translate-y-0.5 active:translate-y-0 theme-bg-update" style="background-color: var(--primary);">
                Send Reset Link
            </button>
        </form>

        <!-- Success Message (Hidden by default) -->
        <div id="success-message" class="hidden relative z-10 p-4 mt-6 bg-green-50 border border-green-200 rounded-2xl">
            <div class="flex gap-3">
                <i class="fa-solid fa-circle-check text-green-600 text-xl flex-shrink-0 mt-0.5"></i>
                <div>
                    <h3 class="font-semibold text-green-900">Check your email</h3>
                    <p class="text-sm text-green-700">We've sent a password reset link to your email address. Please check your email and follow the instructions.</p>
                </div>
            </div>
        </div>

        <!-- Error Message (Hidden by default) -->
        <div id="error-message" class="hidden relative z-10 p-4 mt-6 bg-red-50 border border-red-200 rounded-2xl">
            <div class="flex gap-3">
                <i class="fa-solid fa-circle-exclamation text-red-600 text-xl flex-shrink-0 mt-0.5"></i>
                <div>
                    <h3 class="font-semibold text-red-900">Error</h3>
                    <p class="text-sm text-red-700" id="error-text"></p>
                </div>
            </div>
        </div>

        <div class="mt-6 text-center relative z-10">
            <p class="text-sm text-gray-600">
                Remember your password? 
                <a href="login.html" class="font-bold theme-text-update" style="color: var(--primary);">Sign In</a>
            </p>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply initial theme
            updateColors(document.documentElement.getAttribute('data-theme') || 'green');
            
            document.addEventListener('themeChanged', (e) => {
                updateColors(e.detail.theme);
            });

            document.getElementById('forgot-form').addEventListener('submit', handleForgotPassword);
        });

        async function handleForgotPassword(event) {
            event.preventDefault();
            
            if (!supabaseClient) {
                document.getElementById('error-text').innerText = 'Authentication service is not available. Please refresh the page and try again.';
                document.getElementById('error-message').classList.remove('hidden');
                return;
            }
            
            const btn = event.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            const form = event.target;
            const email = document.getElementById('email').value;
            const successMsg = document.getElementById('success-message');
            const errorMsg = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');


            // Reset messages
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');

            // Show loading
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/views/password_reset.html',
                });

                if (error) {
                    errorText.innerText = error.message || 'Failed to send reset link. Please try again.';
                    errorMsg.classList.remove('hidden');
                    btn.innerText = originalText;
                    btn.disabled = false;
                } else {
                    // Record successful request for rate limiting
                    recordEmailRequest(email);
                    
                    // Show success message
                    successMsg.classList.remove('hidden');
                    form.reset();
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                errorText.innerText = err.message || 'An unexpected error occurred.';
                errorMsg.classList.remove('hidden');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }


        function updateColors(theme) {
            const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
            const primaryLight = theme === 'blue' ? '#E0F2FE' : '#D1FAE5';
            
            document.querySelectorAll('.theme-bg-update').forEach(el => el.style.backgroundColor = primary);
            document.querySelectorAll('.theme-text-update').forEach(el => el.style.color = primary);
            
            document.querySelectorAll('.theme-focus-ring').forEach(el => {
                el.classList.remove('focus:ring-green-500', 'focus:ring-blue-500');
                el.classList.add(theme === 'blue' ? 'focus:ring-blue-500' : 'focus:ring-green-500');
            });
        }
    </script>
</body>
</html>
