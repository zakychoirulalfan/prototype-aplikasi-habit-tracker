<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981', 100: '#D1FAE5' },
                        blue: { 500: '#5BA4C9', 100: '#E0F2FE' }
                    }
                }
            }
        }
    </script>
</head>
<body class="pb-24 bg-gray-50">

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 flex items-center animate-slide-up relative z-10">
        <h1 class="text-2xl font-bold text-white">Calendar</h1>
    </header>

    <!-- Month Navigation -->
    <section class="px-6 flex justify-between items-center mt-2 animate-slide-up delay-100 relative z-10">
        <button id="cal-prev" class="w-10 h-10 rounded-full flex items-center justify-center text-white/80 hover:bg-white/20 transition">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h2 id="cal-month-title" class="text-lg font-bold text-white">April 2026</h2>
        <button id="cal-next" class="w-10 h-10 rounded-full flex items-center justify-center text-white/80 hover:bg-white/20 transition">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </section>

    <!-- Calendar Grid -->
    <section class="px-6 mt-6 animate-slide-up delay-200">
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <!-- Calendar Table -->
            <table class="w-full table-fixed border-collapse">
                <thead>
                    <tr>
                        <th class="py-2 text-xs font-bold text-gray-400 text-center">S</th>
                        <th class="py-2 text-xs font-bold text-gray-400 text-center">M</th>
                        <th class="py-2 text-xs font-bold text-gray-400 text-center">T</th>
                        <th class="py-2 text-xs font-bold text-gray-400 text-center">W</th>
                        <th class="py-2 text-xs font-bold text-gray-400 text-center">T</th>
                        <th class="py-2 text-xs font-bold text-gray-400 text-center">F</th>
                        <th class="py-2 text-xs font-bold text-gray-400 text-center">S</th>
                    </tr>
                </thead>
                <tbody id="calendar-grid">
                    <!-- Javascript will populate this -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- Habit List for Selected Date (MySQL-powered, single source of truth) -->
    <section class="px-6 mt-6 animate-slide-up delay-300">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold text-gray-900" id="selected-date-text">Select a date</h3>
            <div class="flex items-center gap-3">
                <div id="sync-indicator" class="hidden flex items-center gap-1.5">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold uppercase tracking-wider text-emerald-500">Live</span>
                </div>
            </div>
        </div>
        <div id="calendar-habit-list" class="flex flex-col gap-3">
            <div class="text-center py-6">
                <p class="text-gray-400 text-sm">Pilih tanggal untuk melihat habit</p>
            </div>
        </div>
        
        <!-- Clear All Button at the bottom -->
        <div class="mt-4 flex justify-center pb-2">
            <button onclick="clearAllHabits()" class="border-2 border-red-500 text-red-500 hover:bg-red-500 hover:text-white transition-colors duration-300 font-bold px-6 py-2 rounded-xl flex items-center gap-2 text-sm shadow-sm" title="Clear All Habits">
                <i class="fa-solid fa-trash-can"></i> Clear All
            </button>
        </div>
    </section>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex items-center justify-between z-50 shadow-[0_-4px_25px_rgba(0,0,0,0.05)] text-gray-400">
        <a href="index.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="calendar.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16 text-[var(--primary)] theme-text-update">
            <i class="fa-regular fa-calendar text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Calendar</span>
        </a>
        
        <div class="w-16 flex justify-center relative -top-6">
            <a href="add_habit.html" class="w-14 h-14 bg-[var(--primary)] theme-bg-update rounded-full flex items-center justify-center text-white text-2xl shadow-[0_8px_20px_-6px_rgba(0,0,0,0.5)] transform transition hover:scale-105 active:scale-95 border-4 border-white">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>
        
        <a href="statistics.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Stats</span>
        </a>
        <a href="profile.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>

    <script src="../js/mysql-api.js"></script>
    <script src="../js/habits.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let calYear, calMonth, calSelectedDay;

        document.addEventListener('DOMContentLoaded', async () => {
            getLoginDate();
            const now = new Date();
            calYear = now.getFullYear();
            calMonth = now.getMonth();
            calSelectedDay = now.getDate();

            // Sync habits from Supabase before rendering
            await syncHabitsFromSupabase();
            renderCalendarFull();

            // Month navigation
            document.getElementById('cal-prev').addEventListener('click', () => {
                calMonth--;
                if (calMonth < 0) { calMonth = 11; calYear--; }
                calSelectedDay = null;
                renderCalendarFull();
            });
            document.getElementById('cal-next').addEventListener('click', () => {
                calMonth++;
                if (calMonth > 11) { calMonth = 0; calYear++; }
                calSelectedDay = null;
                renderCalendarFull();
            });

            document.addEventListener('themeChanged', () => {
                renderCalendarFull();
            });
        });

        function renderCalendarFull() {
            const theme = document.documentElement.getAttribute('data-theme') || 'green';
            const primaryColor = theme === 'blue' ? '#5BA4C9' : '#10B981';
            const lightColor = theme === 'blue' ? '#E0F2FE' : '#D1FAE5';
            const today = new Date();
            const todayStr = getLocalDateString(today);

            // Month title
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('cal-month-title').textContent = `${monthNames[calMonth]} ${calYear}`;

            // Calendar grid
            const tbody = document.getElementById('calendar-grid');
            if(!tbody) return;
            const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

            const habits = getHabits();
            const completions = getCompletions();
            const loginDate = getLoginDate();

            let html = '<tr>';
            // Empty cells
            for (let i = 0; i < firstDay; i++) {
                html += '<td class="border border-gray-100 p-1"></td>';
            }

            let dayOfWeek = firstDay;

            for (let d = 1; d <= daysInMonth; d++) {
                if (dayOfWeek === 7) {
                    html += '</tr><tr>';
                    dayOfWeek = 0;
                }

                const dateObj = new Date(calYear, calMonth, d);
                const dateStr = getLocalDateString(dateObj);
                const isToday = dateStr === todayStr;
                const isSelected = d === calSelectedDay;
                const isPast = dateObj <= today;
                const isFuture = dateStr > todayStr;

                let cellClasses = 'border border-gray-200 p-1 align-top text-center transition-colors cursor-pointer hover:bg-gray-50';
                let innerClasses = 'w-7 h-7 rounded-full flex items-center justify-center mx-auto text-sm font-medium relative transition-transform hover:scale-110';
                let style = '';

                if (isSelected) {
                    innerClasses += ' text-white shadow-md';
                    style = `background-color: ${primaryColor};`;
                    cellClasses += ' bg-gray-50';
                } else if (isToday) {
                    innerClasses += ' text-white';
                    style = `background-color: ${primaryColor}; opacity: 0.8;`; // Green circle for active day
                } else if (isFuture) {
                    innerClasses += ' text-gray-400';
                } else {
                    innerClasses += ' text-gray-700';
                }

                // Red dot for dates with incomplete habits
                let dotHtml = '';
                if (habits.length > 0 && dateStr >= loginDate && dateStr <= todayStr) {
                    const allCompleted = habits.every(h => completions[dateStr] && completions[dateStr][h.id]);
                    if (!allCompleted) {
                        dotHtml = '<span class="cal-red-dot absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-red-500 rounded-full"></span>';
                    }
                }

                html += `<td class="${cellClasses}" onclick="selectCalDate(${d})">
                            <div class="py-1">
                                <div class="${innerClasses}" style="${style}" data-date="${dateStr}" data-day="${d}">
                                    ${d}${dotHtml}
                                </div>
                            </div>
                         </td>`;
                
                dayOfWeek++;
            }

            // Fill remaining cells
            while (dayOfWeek < 7) {
                html += '<td class="border border-gray-100 p-1"></td>';
                dayOfWeek++;
            }
            html += '</tr>';

            tbody.innerHTML = html;

            // Render selected date habits
            if (calSelectedDay) {
                const selDate = new Date(calYear, calMonth, calSelectedDay);
                const selDateStr = getLocalDateString(selDate);
                document.getElementById('selected-date-text').textContent = selDate.toLocaleDateString('id-ID', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                // Jika dipanggil dari toggle (bukan navigasi user), skip syncMysqlForDate
                // agar tidak terjadi infinite loop
                if (!window._calendarSyncing) {
                    const calHabitList = document.getElementById('calendar-habit-list');
                    if (calHabitList) {
                        calHabitList.innerHTML = `
                            <div class="flex items-center justify-center gap-2 py-6 text-gray-400">
                                <i class="fa-solid fa-spinner fa-spin"></i>
                                <span class="text-sm">Memuat data...</span>
                            </div>`;
                    }
                    syncMysqlForDate(selDateStr);
                }
            } else {
                document.getElementById('selected-date-text').textContent = `${monthNames[calMonth]} ${calYear}`;
                const calHabitList = document.getElementById('calendar-habit-list');
                if(calHabitList) {
                    calHabitList.innerHTML = `
                        <div class="text-center py-6">
                            <p class="text-gray-400 text-sm">Pilih tanggal untuk melihat habit</p>
                        </div>`;
                }
                document.getElementById('sync-indicator').classList.add('hidden');
            }
        }

        function selectCalDate(day) {
            calSelectedDay = day;
            renderCalendarFull();
            // MySQL sync sudah dipanggil di dalam renderCalendarFull
        }

        // ─── Fungsi Sinkronisasi MySQL ──────────────────────────────
        // Dipanggil setiap kali user memilih tanggal di kalender.
        // Mengisi #calendar-habit-list (satu-satunya list) dari MySQL.
        async function syncMysqlForDate(dateStr) {
            const habitList = document.getElementById('calendar-habit-list');
            const syncIndicator = document.getElementById('sync-indicator');
            if (!habitList) return;

            syncIndicator && syncIndicator.classList.remove('hidden');

            try {
                // Panggil API fetchHabitsWithLogs dari mysql-api.js
                const result = await fetchHabitsWithLogs(dateStr);

                if (result.success && result.habits.length > 0) {
                    // Render ke list utama (bukan panel terpisah)
                    renderSyncedHabits('calendar-habit-list', result.habits, dateStr, 'calendar');

                    // Update completions di localStorage agar red-dot akurat
                    const completions = getCompletions();
                    if (!completions[dateStr]) completions[dateStr] = {};
                    result.habits.forEach(h => {
                        completions[dateStr][h.habit_id] = (h.checklist_status === 1);
                    });
                    localStorage.setItem('completions', JSON.stringify(completions));
                    // Re-render kalender untuk update red-dot.
                    // WAJIB set _calendarSyncing = true agar renderCalendarFull
                    // TIDAK memanggil syncMysqlForDate ulang → mencegah infinite loop.
                    window._calendarSyncing = true;
                    renderCalendarFull();
                    window._calendarSyncing = false;

                } else if (result.success && result.habits.length === 0) {
                    habitList.innerHTML = `
                        <div class="text-center py-8 text-gray-400">
                            <i class="fa-solid fa-calendar-xmark text-2xl mb-2"></i>
                            <p class="text-sm font-medium">Belum ada habit untuk tanggal ini.</p>
                            <p class="text-xs mt-1">Tambahkan habit melalui tombol + di bawah.</p>
                        </div>`;
                } else {
                    // User belum login MySQL atau server tidak aktif
                    habitList.innerHTML = `
                        <div class="text-center py-8 text-gray-400">
                            <i class="fa-solid fa-server text-2xl mb-2"></i>
                            <p class="text-sm">${result.message || 'Gagal memuat data. Pastikan sudah login.'}</p>
                        </div>`;
                }
            } catch (err) {
                console.warn('MySQL sync error:', err);
                habitList.innerHTML = `
                    <div class="text-center py-8 text-red-400">
                        <i class="fa-solid fa-triangle-exclamation text-2xl mb-2"></i>
                        <p class="text-sm">Tidak dapat terhubung ke server.</p>
                    </div>`;
            } finally {
                syncIndicator && syncIndicator.classList.add('hidden');
            }
        }

        // ─── Fitur Clear Habit (Single & All) ──────────────────────────────
        window.clearHabit = async function(id) {
            // Hapus dari local state
            let habits = getHabits();
            habits = habits.filter(h => h.id !== id);
            saveHabitsCache(habits);
            
            // Hapus dari Supabase / MySQL backend
            await deleteHabitsFromSupabase([id]);
            
            // Update re-render UI secara otomatis
            renderCalendarFull();
            if (typeof renderCalendarRedDots === 'function') renderCalendarRedDots();
            if (typeof showToast === 'function') showToast('Satu habit berhasil dihapus dari kalender.');
        };

        window.clearAllHabits = function() {
            const habits = getHabits();
            if (habits.length === 0) {
                if (typeof showToast === 'function') showToast('Kalender sudah kosong.', 'error');
                return;
            }

            const confirmAction = async () => {
                const ids = habits.map(h => h.id);
                
                // Kosongkan dari local state
                saveHabitsCache([]);
                
                // Hapus dari backend
                await deleteHabitsFromSupabase(ids);
                
                // Update re-render UI secara otomatis
                renderCalendarFull();
                if (typeof renderCalendarRedDots === 'function') renderCalendarRedDots();
                if (typeof showToast === 'function') showToast('Semua habit berhasil dibersihkan dari kalender.');
            };

            const msg = 'Apakah Anda yakin ingin menghapus semua jadwal habit ini dari kalender? Tindakan ini tidak dapat dibatalkan.';
            
            if (typeof showConfirmModal === 'function') {
                showConfirmModal('Clear All Habits', msg, 'Ya, Hapus Semua', 'bg-red-500 hover:bg-red-600', confirmAction);
            } else {
                if (confirm(msg)) confirmAction();
            }
        };
    </script>
</body>
</html>
