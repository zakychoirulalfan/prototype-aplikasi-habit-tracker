<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: {
                            500: '#10B981',
                        },
                        blue: {
                            500: '#5BA4C9',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans h-screen flex flex-col relative overflow-hidden bg-white">

    <main class="flex-1 overflow-y-auto pb-24 relative z-10 no-scrollbar">
        <!-- Deep immersive background gradient matching reference UI -->
        <div id="theme-bg-gradient"
            class="absolute top-0 left-0 right-0 h-[400px] z-0 pointer-events-none transition-all duration-700"></div>
        <!-- Header -->
        <header class="px-6 pt-8 pb-4 flex justify-between items-center animate-slide-up relative z-20">
            <div class="flex items-center gap-3">
                <a href="profile.html"
                    class="w-12 h-12 rounded-full overflow-hidden border-2 border-white/40 shadow-sm relative group block cursor-pointer transition transform hover:scale-105 active:scale-95">
                    <img src="https://i.pravatar.cc/150?img=11" alt="Profile" class="w-full h-full object-cover">
                </a>
                <div>
                    <p class="text-[10px] font-bold text-white/80 uppercase tracking-wider shadow-sm"
                        style="text-shadow: 0 1px 2px rgba(0,0,0,0.1)">WELCOME BACK</p>
                    <div class="flex items-center gap-1">
                        <h1 class="text-xl font-bold text-white leading-none shadow-sm"
                            style="text-shadow: 0 1px 2px rgba(0,0,0,0.1)">Username</h1>
                        <div class="text-white text-sm">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                    </div>
                </div>
            </div>
            <button
                class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md text-white border border-white/30 flex items-center justify-center hover:bg-white/30 transition shadow-sm">
                <i class="fa-regular fa-bell"></i>
            </button>
        </header>

        <!-- Hero Image Slider (Swiper Cards Effect) -->
        <section class="px-6 py-4 animate-slide-up delay-100 relative group z-10 w-full max-w-[400px] mx-auto">
            <div class="swiper heroSwiper w-full h-56 rounded-3xl" id="hero-shadow-container"
                style="box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.25), 0 8px 10px -6px rgba(16, 185, 129, 0.25);">
                <div class="swiper-wrapper">
                    <!-- Slide 1 -->
                    <div class="swiper-slide rounded-3xl overflow-hidden shadow-lg border border-white/20">
                        <img src="../assets/motivation_focus_new_1775412578495.png" class="w-full h-full object-cover"
                            alt="Stay Focused">
                    </div>
                    <!-- Slide 2 -->
                    <div class="swiper-slide rounded-3xl overflow-hidden shadow-lg border border-white/20">
                        <img src="../assets/motivation_start_new_1775412596159.png" class="w-full h-full object-cover"
                            alt="Start Today">
                    </div>
                    <!-- Slide 3 -->
                    <div class="swiper-slide rounded-3xl overflow-hidden shadow-lg border border-white/20">
                        <img src="../assets/motivation_push_new_1775412616227.png" class="w-full h-full object-cover"
                            alt="Keep Pushing">
                    </div>
                </div>
                <!-- Optional Swiper Pagination -->
                <div class="swiper-pagination mt-2"></div>
            </div>
        </section>

        <!-- Date & Time Section -->
        <section class="mt-8 animate-slide-up delay-200 w-full" style="overflow: visible;">
            <div class="px-6 flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-900">Date & Time</h2>
            </div>

            <!-- Month Selector -->
            <div class="flex w-full overflow-x-auto no-scrollbar px-6 gap-6 mb-4 pb-1" id="mobile-month-selector">
                <!-- Dynamically populated -->
            </div>

            <!-- Date Selector -->
            <div class="flex w-full overflow-x-auto no-scrollbar px-6 gap-3 pb-4" id="mobile-date-selector"
                style="padding-top: 14px; overflow-y: visible;">
                <!-- Dynamically populated -->
            </div>
        </section>

        <!-- Habits List -->
        <section class="mt-4 px-6 animate-slide-up delay-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-900">Your Habits</h2>
                <button id="select-mode-btn" onclick="toggleSelectMode()"
                    class="text-sm font-semibold text-[var(--primary)] hover:underline focus:outline-none theme-text-update">Select
                    Multiple</button>
            </div>

            <div class="flex flex-col gap-4 mb-8" id="habit-list">
                <!-- Dynamically populated by app.js from localStorage -->
            </div>
        </section>
    </main>

    <!-- Tab Bar -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex items-center justify-between z-50 shadow-[0_-4px_25px_rgba(0,0,0,0.05)] text-gray-400">
        <a href="index.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16 text-[var(--primary)] theme-text-update">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Home</span>
        </a>
        <a href="calendar.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-calendar text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Calendar</span>
        </a>

        <div class="w-16 flex justify-center relative -top-6">
            <a href="add_habit.html"
                class="w-14 h-14 bg-[var(--primary)] theme-bg-update rounded-full flex items-center justify-center text-white text-2xl shadow-[0_8px_20px_-6px_rgba(0,0,0,0.5)] transform transition hover:scale-105 active:scale-95 border-4 border-white">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>

        <a href="statistics.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Stats</span>
        </a>
        <a href="profile.html"
            class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>

    <!-- Select Mode Action Bar (Hidden by default) -->
    <div id="select-action-bar"
        class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-white px-6 py-3 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 flex items-center justify-between gap-6 z-50 transition-all duration-300 transform translate-y-20 opacity-0 pointer-events-none w-11/12 max-w-sm">
        <span class="text-gray-700 font-bold text-sm"><span id="selected-count">0</span> Selected</span>
        <button onclick="confirmDeletion()"
            class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors shadow-sm focus:outline-none">
            <i class="fa-solid fa-trash mr-1.5"></i>Delete
        </button>
    </div>

    <!-- Delete Confirmation Modal (Hidden by default) -->
    <div id="delete-confirm-modal"
        class="fixed inset-0 bg-gray-900/40 z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-6 backdrop-blur-sm">
        <div
            class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300 popup-content">
            <div
                class="w-14 h-14 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-2xl mb-4 mx-auto">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-900 text-center mb-2">Delete Habits</h3>
            <p class="text-gray-500 text-center text-sm mb-6">Are you sure you want to delete the selected habits? This
                action cannot be undone.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()"
                    class="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors">Cancel</button>
                <button onclick="executeDeletion()"
                    class="flex-1 py-3.5 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-[0_4px_14px_0_rgba(239,68,68,0.39)] transition-colors">Continue</button>
            </div>
        </div>
    </div>
    <script src="../js/habits.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Update box shadow based on theme
        function updateShadows(theme) {
            const cards = document.querySelectorAll('.habit-card');
            cards.forEach(card => {
                if (theme === 'blue') {
                    card.style.boxShadow = '0 4px 14px 0 rgba(91, 164, 201, 0.39)';
                } else {
                    card.style.boxShadow = '0 4px 14px 0 rgba(16, 185, 129, 0.39)';
                }
            });
            // Update shadow on the hero container to match theme
            const heroShadow = document.getElementById('hero-shadow-container');
            if (heroShadow) {
                if (theme === 'blue') {
                    heroShadow.style.boxShadow = '0 20px 25px -5px rgba(91, 164, 201, 0.25), 0 8px 10px -6px rgba(91, 164, 201, 0.25)';
                } else {
                    heroShadow.style.boxShadow = '0 20px 25px -5px rgba(16, 185, 129, 0.25), 0 8px 10px -6px rgba(16, 185, 129, 0.25)';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Set login date on first visit
            getLoginDate();

            // Load dynamic user info
            if (supabaseClient) {
                const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
                if (user && !userError) {
                    const name = user.user_metadata?.full_name || 'User';
                    const usernameEl = document.getElementById('dashboard-username');
                    const avatarEl = document.getElementById('dashboard-avatar');

                    if (usernameEl) usernameEl.textContent = name;

                    // Load avatar dari Supabase profiles table
                    if (avatarEl) {
                        try {
                            const { data: profile, error: profileError } = await supabaseClient
                                .from('profiles')
                                .select('avatar_url')
                                .eq('id', user.id)
                                .single();

                            if (profile?.avatar_url && !profileError) {
                                avatarEl.src = profile.avatar_url;
                            } else {
                                // Fallback ke UI avatars jika belum ada foto
                                avatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=10B981&color=fff&bold=true`;
                            }
                        } catch (err) {
                            console.error('Error loading avatar:', err);
                            // Gunakan default avatar jika ada error
                            avatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=10B981&color=fff&bold=true`;
                        }
                    }
                }
            }

            // Sync habits from Supabase, then render
            await syncHabitsFromSupabase();
            renderHomeHabits();
            updateShadows(document.documentElement.getAttribute('data-theme') || 'green');
            // Red dots on date slider
            setTimeout(() => renderHomeDateRedDots(), 300);

            // Initialize Swiper
            if (typeof Swiper !== 'undefined') {
                new Swiper(".heroSwiper", {
                    effect: "cards",
                    grabCursor: true,
                    cardsEffect: {
                        slideShadows: false,
                        perSlideOffset: 8,
                        perSlideRotate: 4,
                    },
                    autoplay: {
                        delay: 3500,
                        disableOnInteraction: false,
                    },
                    pagination: {
                        el: ".swiper-pagination",
                        dynamicBullets: true,
                    },
                });
            }

            updateHeroCard();
        });

        // Listen to theme changes from app.js
        document.addEventListener('themeChanged', (e) => {
            updateShadows(e.detail.theme);
            renderHomeDateRedDots();
        });

        // Re-render dots when slider rebuilds the dates
        document.addEventListener('monthChanged', () => {
            renderHomeDateRedDots();
        });
    </script>
</body>

</html>
